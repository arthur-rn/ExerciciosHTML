<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>
<body>
    
    <!-- MÓDULO 5: HORÁRIOS DAS AULAS (PRECISA DE TABELA SEMÂNTICA) -->
    <div class="bloco-cronograma">
        <h2 class="titulo-seccao">Horários Académicos</h2>
        <table border="1">
            <caption>Horários das Aulas</caption>

            <thead>
                <tr>
                    <td>Aula</td>
                    <td>Horário</td>
                </tr>
            </thead>
            
            <tbody>
                <tr>
                    <td>Estruturação Multimídia</td>
                    <td>19:00 - 20:30</td>
                </tr>
            </tbody>
        </table>
        
        <p>Recursos necessários:</p>
        <ul>
            <li>Computador com IDE configurada</li>
            <li>Arquivos de legenda (.vtt) prontos</li>
        </ul>
    </div>

    <hr>

    <!-- MÓDULO 6: CONTEÚDO INTEGRADO (PRECISA DE ACESSIBILIDADE E SEGURANÇA) -->
    <div class="bloco-video">
        <h2>Apresentação da Disciplina</h2>
        <!-- Falta controle de vídeo e acessibilidade de legendas -->
        <video src="apresentacao.mp4" controls>
            <track kind="captions" src="legendas.vtt" srclang="pt" label="Português" default </video>
    </div>

    <div class="bloco-mapa">
        <h2>Localização do Campus IFF</h2>
        <iframe src="https://mapas.iff.edu.br" title="Mapa de localização do Campus IFF"
    sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

</body>
</html>
