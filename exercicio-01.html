<!DOCTYPE html>
<html lang="pt-br">
<meta charset="UTF-8">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Formulário</title>
    <meta name="description" content="Área de contato do cliente para envio de mensagens à equipe de suporte técnico. Preencha seus dados, incluindo nome, e-mail, telefone celular e mensagem para receber atendimento especializado.">
</head>
<body>
    <header>
        <h1>Área de Contato do Cliente</h1>
        <nav>
            <a href="#">Ajuda</a> | <a href="#">Sair</a>
        </nav>
    </header>

    <main>
        <article>
            <h2>Envie sua mensagem para a nossa equipe de suporte backend</h2>

            <form action="/enviar" method="POST">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required minlength="3"><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required minlength="5"><br><br>

                <label for="celular">Telefone Celular:</label>
                <input type="tel" id="celular" name="celular" pattern="[0-9]{11}" required><br><br>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem"></textarea><br><br>

                <input type="submit" value="Disparar Dados">
            </form>
        </article>
    </main>

    <footer>
        Suporte Tech 2026
    </footer>
</body>
</html>
